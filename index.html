<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StatBiz CEO (สถิติพิชิตธุรกิจ)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gradient-to-br from-indigo-900 via-blue-800 to-sky-900 min-h-screen">

    <div id="root"></div>

    <script type="text/babel">
        // Lucide Icons Wrapper for browser CDN
        const Play = () => <i data-lucide="play" class="w-6 h-6 inline"></i>;
        const CheckCircle = () => <i data-lucide="check-circle" class="w-6 h-6 inline"></i>;
        const AlertCircle = () => <i data-lucide="alert-circle" class="w-10 h-10 inline"></i>;
        const ArrowRight = () => <i data-lucide="arrow-right" class="w-5 h-5 inline"></i>;
        const Star = () => <i data-lucide="star" class="w-5 h-5 text-yellow-400 fill-yellow-400 inline"></i>;
        const Award = () => <i data-lucide="award" class="w-6 h-6 inline"></i>;
        const Briefcase = () => <i data-lucide="briefcase" class="w-12 h-12 inline"></i>;
        const ChevronRight = () => <i data-lucide="chevron-right" class="w-5 h-5 inline"></i>;
        const Check = () => <i data-lucide="check" class="w-10 h-10 inline"></i>;
        const Users = () => <i data-lucide="users" class="w-5 h-5 inline"></i>;
        const TrendingUp = () => <i data-lucide="trending-up" class="w-5 h-5 inline"></i>;

        const THEME = {
            bg: 'bg-gradient-to-br from-indigo-900 via-blue-800 to-sky-900',
            card: 'bg-white rounded-3xl shadow-2xl border-0 p-4 md:p-8',
            primary: 'bg-indigo-600 hover:bg-indigo-700 text-white shadow-lg shadow-indigo-200',
            secondary: 'bg-sky-100 hover:bg-sky-200 text-sky-800',
            text: 'text-slate-700',
            title: 'text-indigo-800 font-bold',
        };

        const generateRandomQueue = () => {
            const items = [...Array(8).fill('🧋'), ...Array(7).fill('🍵'), ...Array(5).fill('🍫')];
            for (let i = items.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [items[i], items[j]] = [items[j], items[i]];
            }
            return items;
        };

        const PHASE_INFO = {
            1: { title: "ร้านเครื่องดื่มชานมไข่มุก 🧋", level: "เริ่มต้น", goal: "เรียนรู้การจัดระเบียบข้อมูลและคำนวณสถิติพื้นฐาน", color: "from-orange-400 to-amber-600", bgLight: "bg-orange-50", icon: "🧋" },
            2: { title: "ร้านเบเกอรี่แสนหวาน 🥐", level: "ปานกลาง", goal: "เรียนรู้ความสัมพันธ์ของข้อมูลแบบสองมิติและการนำเสนอข้อมูล", color: "from-amber-500 to-pink-500", bgLight: "bg-amber-50", icon: "🥐" },
            3: { title: "ร้านอาหาร Fine Dining 🥩", level: "ประยุกต์ขั้นสูง", goal: "วิเคราะห์ข้อมูลข้อความเชิงลึก และสรุปภาพรวมเพื่อการบริหาร", color: "from-rose-500 to-red-700", bgLight: "bg-rose-50", icon: "🥩" }
        };

        function App() {
            const [viewState, setViewState] = React.useState('intro');
            const [currentMission, setCurrentMission] = React.useState(1);
            const [score, setScore] = React.useState(100);
            const [playerInfo, setPlayerInfo] = React.useState({ name: '', classStr: '', number: '' });
            const [isLoading, setIsLoading] = React.useState(false);
            const [alert, setAlert] = React.useState(null);

            React.useEffect(() => {
                const style = document.createElement('style');
                style.innerHTML = `
                    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
                    body { font-family: 'Sarabun', sans-serif; }
                    .swal-backdrop { animation: fadeIn 0.3s ease; }
                    .swal-popup { animation: scaleIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
                    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
                    @keyframes scaleIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
                `;
                document.head.appendChild(style);
                lucide.createIcons();
            }, []);

            React.useEffect(() => {
                lucide.createIcons();
            }, [viewState, currentMission, alert, isLoading]);

            const currentPhase = currentMission <= 5 ? 1 : currentMission <= 10 ? 2 : 3;

            const showLoading = (callback) => {
                setIsLoading(true);
                setTimeout(() => {
                    setIsLoading(false);
                    callback();
                }, 1200);
            };

            const startGame = () => showLoading(() => setViewState('phase_intro'));

            const handleCorrect = () => {
                setAlert({
                    type: 'success',
                    title: 'ยอดเยี่ยมมาก!',
                    text: 'วิเคราะห์ข้อมูลได้อย่างถูกต้อง เฉียบขาดมากท่าน CEO',
                    onConfirm: () => {
                        setAlert(null);
                        if (currentMission === 15) {
                            showLoading(() => setViewState('ending'));
                        } else if (currentMission === 5 || currentMission === 10) {
                            setCurrentMission(prev => prev + 1);
                            showLoading(() => setViewState('phase_intro'));
                        } else {
                            setCurrentMission(prev => prev + 1);
                        }
                    }
                });
            };

            const handleError = () => {
                setScore(prev => Math.max(0, prev - 2));
                setAlert({
                    type: 'error',
                    title: 'ข้อมูลคลาดเคลื่อน!',
                    text: 'อ๊ะ! การตัดสินใจยังไม่ถูกต้อง ลองวิเคราะห์ข้อมูลใหม่อีกครั้งนะ ✌️',
                    onConfirm: () => setAlert(null)
                });
            };

            const handleWarning = (msg) => {
                setAlert({
                    type: 'warning',
                    title: 'ข้อมูลไม่ครบถ้วน',
                    text: msg || 'กรุณากรอกข้อมูลให้ครบทุกช่องก่อนดำเนินการครับ',
                    onConfirm: () => setAlert(null)
                });
            };

            const resetGame = () => {
                showLoading(() => {
                    setViewState('intro');
                    setCurrentMission(1);
                    setScore(100);
                    setPlayerInfo({ name: '', classStr: '', number: '' });
                });
            };

            return (
                <div class="font-sarabun text-slate-800 flex flex-col relative min-h-screen">
                    <div class="flex-grow flex items-center justify-center p-3 md:p-8 z-10 pb-20">
                        <div class="max-w-4xl w-full">
                            {viewState === 'intro' && <IntroScreen onStart={startGame} playerInfo={playerInfo} setPlayerInfo={setPlayerInfo} onWarning={handleWarning} />}
                            {viewState === 'phase_intro' && <PhaseIntroScreen phase={currentPhase} onStart={() => showLoading(() => setViewState('playing'))} />}
                            {viewState === 'playing' && (
                                <div class="space-y-4 md:space-y-6">
                                    <div class="flex justify-between items-center bg-white/95 backdrop-blur rounded-2xl p-3 md:p-4 shadow-lg border-b-4" style={{ borderColor: currentPhase === 1 ? '#f97316' : currentPhase === 2 ? '#d97706' : '#be123c' }}>
                                        <div class="flex items-center gap-3 md:gap-4">
                                            <div class={`w-10 h-10 md:w-12 md:h-12 rounded-xl flex items-center justify-center text-xl md:text-2xl shadow-inner ${PHASE_INFO[currentPhase].bgLight}`}>
                                                {PHASE_INFO[currentPhase].icon}
                                            </div>
                                            <div>
                                                <h2 class="text-base md:text-xl font-bold text-slate-800 leading-tight">Phase {currentPhase}: {PHASE_INFO[currentPhase].title}</h2>
                                                <p class="text-xs md:text-sm text-slate-500 font-medium">ภารกิจที่ {currentMission}/15 • Level: {PHASE_INFO[currentPhase].level}</p>
                                            </div>
                                        </div>
                                        <div class="text-right flex flex-col items-end shrink-0">
                                            <div class="flex items-center gap-1 bg-slate-50 px-2 py-1 md:px-3 md:py-1 rounded-full border border-slate-200">
                                                <Star />
                                                <span class="text-lg md:text-xl font-bold text-indigo-700">{score}</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div class={THEME.card}>
                                        {currentMission === 1 && <Mission1 onSuccess={handleCorrect} />}
                                        {currentMission === 2 && <Mission2 onSuccess={handleCorrect} onError={handleError} onWarning={handleWarning} />}
                                        {currentMission === 3 && <Mission3 onSuccess={handleCorrect} onError={handleError} onWarning={handleWarning} />}
                                        {currentMission === 4 && <Mission4 onSuccess={handleCorrect} onError={handleError} onWarning={handleWarning} />}
                                        {currentMission === 5 && <Mission5 onSuccess={handleCorrect} onError={handleError} />}
                                        {currentMission === 6 && <Mission6 onSuccess={handleCorrect} onError={handleError} onWarning={handleWarning} />}
                                        {currentMission === 7 && <Mission7 onSuccess={handleCorrect} onError={handleError} onWarning={handleWarning} />}
                                        {currentMission === 8 && <Mission8 onSuccess={handleCorrect} onError={handleError} />}
                                        {currentMission === 9 && <Mission9 onSuccess={handleCorrect} onError={handleError} />}
                                        {currentMission === 10 && <Mission10 onSuccess={handleCorrect} onError={handleError} />}
                                        {currentMission === 11 && <Mission11 onSuccess={handleCorrect} onError={handleError} onWarning={handleWarning} />}
                                        {currentMission === 12 && <Mission12 onSuccess={handleCorrect} onError={handleError} />}
                                        {currentMission === 13 && <Mission13 onSuccess={handleCorrect} onError={handleError} />}
                                        {currentMission === 14 && <Mission14 onSuccess={handleCorrect} onError={handleError} />}
                                        {currentMission === 15 && <Mission15 onSuccess={handleCorrect} onError={handleError} />}
                                    </div>
                                </div>
                            )}
                            {viewState === 'ending' && <EndingScreen score={score} playerInfo={playerInfo} onRestart={resetGame} />}
                        </div>
                    </div>
                    <footer class="w-full py-4 text-center text-white/70 text-xs md:text-sm absolute bottom-0 font-medium z-0">
                        © 2026 Copyright | พัฒนาโดย คุณครูพิมพ์ลักษณ์ เจริญวานิชกูร
                    </footer>
                    {isLoading && <LoadingOverlay />}
                    {alert && <SweetAlert {...alert} />}
                </div>
            );
        }

        // --- SUB COMPONENTS ---
        function LoadingOverlay() {
            return (
                <div class="fixed inset-0 bg-indigo-900/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center swal-backdrop">
                    <div class="w-16 h-16 md:w-20 md:h-20 border-4 border-indigo-200 border-t-white rounded-full animate-spin mb-4"></div>
                    <h3 class="text-white text-lg md:text-xl font-bold tracking-widest animate-pulse">กำลังประมวลผล...</h3>
                </div>
            );
        }

        function SweetAlert({ type, title, text, onConfirm }) {
            const isSuccess = type === 'success';
            const isWarning = type === 'warning';
            let iconBg = 'bg-rose-100 text-rose-500';
            let btnBg = 'bg-rose-500 hover:bg-rose-600';
            let iconName = isSuccess ? 'check' : 'alert-circle';
            if (isSuccess) { iconBg = 'bg-emerald-100 text-emerald-500'; btnBg = 'bg-emerald-500 hover:bg-emerald-600'; }
            else if (isWarning) { iconBg = 'bg-amber-100 text-amber-500'; btnBg = 'bg-amber-500 hover:bg-amber-600'; }
            return (
                <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 swal-backdrop">
                    <div class="bg-white rounded-3xl p-6 md:p-8 max-w-sm w-full text-center shadow-2xl swal-popup flex flex-col items-center">
                        <div class={`w-16 h-16 md:w-20 md:h-20 rounded-full flex items-center justify-center mb-4 shadow-inner ${iconBg}`}>
                            <i data-lucide={iconName} class="w-8 h-8 md:w-10 md:h-10" stroke-width="3"></i>
                        </div>
                        <h2 class="text-xl md:text-2xl font-bold text-slate-800 mb-2">{title}</h2>
                        <p class="text-sm md:text-base text-slate-600 mb-6">{text}</p>
                        <button onClick={onConfirm} class={`w-full py-3 rounded-xl font-bold text-white shadow-md transition-transform hover:scale-105 ${btnBg}`}>
                            {isSuccess ? 'ลุยภารกิจต่อไป!' : 'ตกลง'}
                        </button>
                    </div>
                </div>
            );
        }

        function IntroScreen({ onStart, playerInfo, setPlayerInfo, onWarning }) {
            return (
                <div class={`${THEME.card} text-center space-y-6 md:space-y-8 py-10 md:py-14 relative overflow-hidden`}>
                    <div class="relative z-10">
                        <div class="flex justify-center mb-4"><div class="bg-indigo-100 p-4 rounded-3xl shadow-inner"><Briefcase /></div></div>
                        <h1 class="text-4xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-sky-500 mb-2">StatBiz CEO</h1>
                        <h2 class="text-xl md:text-2xl text-slate-500 font-semibold mb-4">สถิติพิชิตธุรกิจ 📊</h2>
                        <p class="text-slate-600 max-w-lg mx-auto text-sm md:text-lg mb-6">ยินดีต้อนรับท่าน CEO คนใหม่! ภารกิจของคุณคือการบริหารธุรกิจ 3 ระดับ โดยใช้ "ข้อมูลเชิงคุณภาพ" มาวิเคราะห์เพื่อการตัดสินใจ</p>
                        <div class="bg-slate-50 p-5 rounded-2xl border border-slate-200 max-w-lg mx-auto mb-8 text-left space-y-4 shadow-sm">
                            <h3 class="font-bold text-indigo-900 text-base flex items-center gap-2 border-b border-indigo-100 pb-2"><Users /> ข้อมูลผู้บริหาร (CEO)</h3>
                            <div>
                                <label class="block text-xs font-semibold text-slate-600 mb-1">ชื่อ-นามสกุล</label>
                                <input type="text" class="w-full border-2 border-slate-300 rounded-xl px-3 py-2 text-sm focus:border-indigo-500 outline-none" placeholder="นาย / นางสาว" value={playerInfo.name} onChange={e => setPlayerInfo({...playerInfo, name: e.target.value})} />
                            </div>
                            <div class="flex gap-4">
                                <div class="flex-1">
                                    <label class="block text-xs font-semibold text-slate-600 mb-1">ชั้นเรียน</label>
                                    <input type="text" class="w-full border-2 border-slate-300 rounded-xl px-3 py-2 text-sm focus:border-indigo-500 outline-none" placeholder="เช่น ม.6/1" value={playerInfo.classStr} onChange={e => setPlayerInfo({...playerInfo, classStr: e.target.value})} />
                                </div>
                                <div class="w-32">
                                    <label class="block text-xs font-semibold text-slate-600 mb-1">เลขที่</label>
                                    <input type="text" class="w-full border-2 border-slate-300 rounded-xl px-3 py-2 text-sm focus:border-indigo-500 outline-none" placeholder="เลขที่" value={playerInfo.number} onChange={e => setPlayerInfo({...playerInfo, number: e.target.value})} />
                                </div>
                            </div>
                        </div>
                        <button onClick={() => { if(!playerInfo.name.trim() || !playerInfo.classStr.trim() || !playerInfo.number.trim()) { onWarning('กรุณากรอกข้อมูลให้ครบถ้วนก่อนเข้าเล่นครับ'); return; } onStart(); }} class={`${THEME.primary} px-8 py-3 rounded-full font-bold text-lg md:text-xl flex items-center justify-center gap-3 mx-auto transition-transform hover:scale-105 w-full md:w-auto`}>
                            <Play /> เข้าสู่ระบบบริหารงาน
                        </button>
                    </div>
                </div>
            );
        }

        function PhaseIntroScreen({ phase, onStart }) {
            const info = PHASE_INFO[phase];
            return (
                <div class={`${THEME.card} text-center space-y-6 py-10 md:py-12 relative overflow-hidden`}>
                    <div class={`absolute top-0 left-0 w-full h-3 bg-gradient-to-r ${info.color}`}></div>
                    <div class="text-6xl md:text-7xl animate-bounce mb-2">{info.icon}</div>
                    <div class="space-y-2">
                        <h3 class="text-indigo-500 font-bold tracking-widest uppercase text-xs">ยินดีต้อนรับท่าน CEO</h3>
                        <h1 class="text-2xl md:text-4xl font-black text-slate-800 leading-tight">บริหารธุรกิจ {info.title}</h1>
                        <div class="inline-block bg-slate-100 px-3 py-1 rounded-full text-slate-600 font-semibold text-xs border border-slate-200 mt-2">Level: {info.level}</div>
                    </div>
                    <div class="bg-indigo-50/50 border border-indigo-100 rounded-2xl p-4 max-w-lg mx-auto shadow-sm">
                        <h4 class="font-bold text-indigo-800 mb-2 flex items-center justify-center gap-2 text-sm"><Award /> เป้าหมายการเรียนรู้</h4>
                        <p class="text-slate-700 text-sm md:text-lg">{info.goal}</p>
                    </div>
                    <button onClick={onStart} class={`bg-gradient-to-r ${info.color} text-white px-6 py-3 rounded-full font-bold text-base md:text-lg flex items-center justify-center gap-2 mx-auto transition-transform hover:scale-105 shadow-lg w-full md:w-auto`}>
                        เริ่มบริหารกิจการ <ChevronRight />
                    </button>
                </div>
            );
        }

        function EndingScreen({ score, playerInfo, onRestart }) {
            const getShopStatus = (type) => {
                if (score >= 80) {
                    if (type === 'drink') return { text: "ลูกค้าเต็มร้านล้นทะลัก!", color: "text-emerald-600", dot: "bg-emerald-500" };
                    if (type === 'bakery') return { text: "คิวยาวทะลุซอย!", color: "text-emerald-600", dot: "bg-emerald-500" };
                    if (type === 'resto') return { text: "จองโต๊ะเต็มข้ามปี!", color: "text-emerald-600", dot: "bg-emerald-500" };
                } else if (score >= 50) {
                    if (type === 'drink') return { text: "ลูกค้าแวะมาเรื่อยๆ", color: "text-amber-600", dot: "bg-amber-500" };
                    if (type === 'bakery') return { text: "ขายหมดพอดีตอนเย็น", color: "text-amber-600", dot: "bg-amber-500" };
                    if (type === 'resto') return { text: "โต๊ะเต็มช่วงสุดสัปดาห์", color: "text-amber-600", dot: "bg-amber-500" };
                } else {
                    if (type === 'drink') return { text: "ลูกค้าน้อยไปนิด จัดโปรด่วน!", color: "text-rose-500", dot: "bg-rose-500" };
                    if (type === 'bakery') return { text: "ขนมเหลือเพียบ...", color: "text-rose-500", dot: "bg-rose-500" };
                    if (type === 'resto') return { text: "มีโต๊ะว่างหลายโต๊ะเลย", color: "text-rose-500", dot: "bg-rose-500" };
                }
            };
            const dS = getShopStatus('drink'); const bS = getShopStatus('bakery'); const rS = getShopStatus('resto');
            return (
                <div class={`${THEME.card} text-center space-y-6 py-8 relative overflow-hidden`}>
                    <div class="absolute top-0 left-0 w-full h-4 bg-gradient-to-r from-emerald-400 to-teal-500"></div>
                    <div class="space-y-2">
                        <h1 class="text-3xl md:text-5xl font-black text-slate-800">StatBiz CEO</h1>
                        <h2 class="text-2xl md:text-4xl font-black text-indigo-600">สถิติพิชิตธุรกิจ</h2>
                        <p class="text-sm md:text-lg text-emerald-700 font-bold bg-emerald-50 border border-emerald-100 inline-block px-4 py-1.5 rounded-full mt-2">สรุปผลการบริหารธุรกิจของ CEO</p>
                    </div>
                    <div class="bg-gradient-to-r from-indigo-50 to-blue-50 border border-indigo-200 text-indigo-900 px-4 py-3 rounded-2xl inline-flex flex-col md:flex-row items-center gap-2 shadow-sm w-full md:w-auto">
                        <div class="flex items-center gap-2 font-black text-lg md:text-2xl"><span>{playerInfo.name || 'ผู้บริหาร'}</span></div>
                        <div class="text-sm font-semibold text-indigo-600 bg-white px-3 py-1 rounded-full shadow-sm">ชั้น {playerInfo.classStr} | เลขที่ {playerInfo.number}</div>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mt-4">
                        <div class="bg-orange-50 border border-orange-200 rounded-2xl p-4 flex flex-col items-center shadow-sm">
                            <div class="text-5xl mb-2 drop-shadow-[0_0_15px_rgba(251,146,60,0.6)]">🧋</div>
                            <h3 class="font-bold text-orange-800">ร้านเครื่องดื่ม</h3>
                            <div class={`text-xs flex items-center font-bold mt-1 ${dS.color}`}><span class={`w-2.5 h-2.5 rounded-full mr-1 ${dS.dot}`}></span>{dS.text}</div>
                        </div>
                        <div class="bg-amber-50 border border-amber-200 rounded-2xl p-4 flex flex-col items-center shadow-sm">
                            <div class="text-5xl mb-2 drop-shadow-[0_0_15px_rgba(251,191,36,0.6)]">🥐</div>
                            <h3 class="font-bold text-amber-800">ร้านเบเกอรี่</h3>
                            <div class={`text-xs flex items-center font-bold mt-1 ${bS.color}`}><span class={`w-2.5 h-2.5 rounded-full mr-1 ${bS.dot}`}></span>{bS.text}</div>
                        </div>
                        <div class="bg-rose-50 border border-rose-200 rounded-2xl p-4 flex flex-col items-center shadow-sm">
                            <div class="text-5xl mb-2 drop-shadow-[0_0_15px_rgba(244,63,94,0.6)]">🥩</div>
                            <h3 class="font-bold text-rose-800">ร้านอาหาร</h3>
                            <div class={`text-xs flex items-center font-bold mt-1 ${rS.color}`}><span class={`w-2.5 h-2.5 rounded-full mr-1 ${rS.dot}`}></span>{rS.text}</div>
                        </div>
                    </div>

                    </thead>
                    <tbody class="text-slate-700 divide-y divide-slate-100 text-xs md:text-sm">{children}</tbody>
                </table>
            );
        }

        function DataRow({ icon, label, inputVal, onChange }) {
            return (
                <tr>
                    <td class="p-3 font-semibold flex items-center gap-1.5"><span>{icon}</span> {label}</td>
                    <td class="p-3"><ModernInput value={inputVal} onChange={onChange} /></td>
                </tr>
            );
        }

        function DataRow3({ icon, label, f, inputVal, onChange, suffix }) {
            return (
                <tr>
                    <td class="p-3 font-semibold flex items-center gap-1.5"><span>{icon}</span> {label}</td>
                    <td class="p-3 text-slate-500 font-bold text-center md:text-left">{f}</td>
                    <td class="p-3">
                        <div class="flex items-center gap-1 justify-center md:justify-start">
                            <ModernInput value={inputVal} onChange={onChange} placeholder={suffix ? "" : "0.xx"} />
                            {suffix && <span class="font-bold text-slate-400 text-xs">{suffix}</span>}
                        </div>
                    </td>
                </tr>
            );
        }

        function ModernInput({ value, onChange, placeholder, className = "" }) {
            return (
                <input type="text" inputMode="decimal" placeholder={placeholder} class={`border-2 border-slate-300 rounded-lg px-2 py-1 w-20 font-bold text-indigo-900 text-center outline-none focus:border-indigo-500 text-xs md:text-sm ${className}`} value={value} onChange={e => onChange(e.target.value)} />
            );
        }

        // Remaining Missions Placeholder to match functionality
        function Mission10({ onSuccess, onError }) {
            return (
                <div class="space-y-4">
                    <MissionHeader title="ภารกิจที่ 10: วิเคราะห์ข้อจำกัดของสถิติ" desc="ข้อมูลเชิงคุณภาพ มีข้อจำกัดบางอย่าง ข้อใดกล่าวถูกต้องที่สุดเกี่ยวกับการนำ 'หน้าตาของเค้กที่ชอบ' มาคำนวณ?" />
                    <div class="space-y-3">
                        <ChoiceButton onClick={onError} text="ก. สามารถนำมาหาค่าเฉลี่ย (Mean) ได้ ถ้านำไปให้คะแนน 1-10" />
                        <ChoiceButton onClick={onSuccess} text="ข. เป็นข้อมูลเชิงคุณภาพ สามารถหาได้แค่ 'ฐานนิยม' แต่หา 'ค่าเฉลี่ยเลขคณิต' ไม่ได้" />
                        <ChoiceButton onClick={onError} text="ค. ข้อมูลเชิงคุณภาพไม่สามารถนำมาทำตารางความถี่ได้เลย" />
                    </div>
                </div>
            );
        }

        function Mission11({ onSuccess, onError, onWarning }) {
            const [selections, setSelections] = React.useState({ r1: '', r2: '', r3: '', r4: '', r5: '' });
            return (
                <div class="space-y-4">
                    <MissionHeader title="ภารกิจที่ 11: วิเคราะห์ข้อความรีวิว" desc="อ่านรีวิวด้านลบจากลูกค้า แล้วเลือกหมวดหมู่ปัญหาหลักให้ถูกต้องเพื่อนำไปปรับปรุงร้าน Fine Dining" />
                    <div class="space-y-3">
                        <ReviewRow text="สเต็กเนื้อเหนียวมาก ซอสก็เค็มไปหน่อย เสียใจมากค่ะ" val={selections.r1} onChange={v => setSelections({...selections, r1: v})} />
                        <ReviewRow text="พนักงานไม่สนใจเลย เรียกเช็คบิลรอไป 20 นาที" val={selections.r2} onChange={v => setSelections({...selections, r2: v})} />
                        <ReviewRow text="จองโต๊ะไว้ล่วงหน้า แต่พอมาถึงกลับบอกว่าโต๊ะเต็ม ระบบแย่มาก" val={selections.r3} onChange={v => setSelections({...selections, r3: v})} />
                        <ReviewRow text="อร่อยนะ แต่ให้ปริมาณนิดเดียวเมื่อเทียบกับเงินที่จ่าย แพงเกินไปมาก" val={selections.r4} onChange={v => setSelections({...selections, r4: v})} />
                        <ReviewRow text="น้ำเปล่าขวดละ 200 บาท ราคาขูดรีดมากเกินไปครับ" val={selections.r5} onChange={v => setSelections({...selections, r5: v})} />
                    </div>
                    <SubmitButton onClick={() => {
                        if(!selections.r1 || !selections.r2 || !selections.r3 || !selections.r4 || !selections.r5) { onWarning('กรุณาจัดหมวดหมู่ให้ครบ 5 ช่องครับ'); return; }
                        (selections.r1 === 'taste' && selections.r2 === 'service' && selections.r3 === 'service' && selections.r4 === 'price' && selections.r5 === 'price') ? onSuccess() : onError();
                    }} />
                </div>
            );
        }

        function ReviewRow({ text, val, onChange }) {
            return (
                <div class="bg-slate-50 p-3 rounded-xl border border-slate-200 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2 text-xs md:text-sm">
                    <p class="italic text-slate-700 font-medium text-left">"{text}"</p>
                    <select class="border-2 border-slate-300 rounded-lg p-1.5 bg-white font-bold text-indigo-900 w-full sm:w-auto outline-none" value={val} onChange={e => onChange(e.target.value)}>
                        <option value="">-- ปัญหา --</option>
                        <option value="taste">🍽️ รสชาติ</option>
                        <option value="service">👨‍🍳 บริการ</option>
                        <option value="price">💸 ราคา</option>
                    </select>
                </div>
            );
        }

        function Mission12({ onSuccess, onError }) {
            return (
                <div class="space-y-4">
                    <MissionHeader title="ภารกิจที่ 12: ตัดสินใจจากฐานนิยม" desc="จากข้อที่แล้ว ถ้าผลรีวิว 100 ข้อความพบว่า: บ่นรสชาติ 20%, บ่นบริการ 70%, บ่นราคา 10% CEO ต้องสั่งแก้ปัญหาใดด่วนที่สุด?" />
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                        <ChoiceButton onClick={onError} text="รสชาติอาหาร (20%)" icon="🍽️" />
                        <ChoiceButton onClick={onSuccess} text="การบริการพนักงาน (70%)" icon="👨‍🍳" />
                        <ChoiceButton onClick={onError} text="ราคาแพง (10%)" icon="💸" />
                    </div>
                </div>
            );
        }

        function Mission13({ onSuccess, onError }) {
            return (
                <div class="space-y-4">
                    <MissionHeader title="ภารกิจที่ 13: วางแผนยุทธศาสตร์" desc="จะเปิดสาขาใหม่ แดชบอร์ดรายงานว่า 'คนทำงานย่านสีลมชอบทานเนื้อวัวพรีเมียม (85%)' ควรเลือกทำเลและวัตถุดิบอย่างไร?" />
                    <div class="space-y-3">
                        <ChoiceButton onClick={onError} text="เปิดย่านสยามสแควร์ (วัยรุ่น) และเน้นเมนูหมูกระทะ" />
                        <ChoiceButton onClick={onSuccess} text="เปิดสาขาที่สีลม และสั่งนำเข้าเนื้อวัวเกรด A+ ล็อตใหญ่" />
                        <ChoiceButton onClick={onError} text="เปิดสาขาสีลม แต่เน้นเมนูผักสลัดเพื่อสุขภาพ (15%)" />
                    </div>
                </div>
            );
        }

        function Mission14({ onSuccess, onError }) {
            return (
                <div class="space-y-4">
                    <MissionHeader title="ภารกิจที่ 14: ตรวจสอบรายงาน (Data Validation)" desc="พนักงานรายงานว่า 'ความพึงพอใจลูกค้า (ดีมาก=3, ปานกลาง=2, แย่=1) เฉลี่ยได้ 2.45' คุณควรสอนพนักงานว่าอย่างไร?" />
                    <div class="space-y-3">
                        <ChoiceButton onClick={onError} text="'เยี่ยมมาก ตัวเลขชัดเจนดี ทำรายงานแบบนี้ต่อไป'" />
                        <ChoiceButton onClick={onError} text="'ไปคำนวณใหม่ น่าจะบวกเลขผิดแน่ๆ'" />
                        <ChoiceButton onClick={onSuccess} text="'ความพึงพอใจเป็นข้อมูลเชิงคุณภาพแบบจัดอันดับ ไม่ควรหาค่าเฉลี่ย ควรรายงานเป็นร้อยละแทน'" />
                    </div>
                </div>
            );
        }

        // Mission 15
        function Mission15({ onSuccess, onError }) {
            return (
                <div class="space-y-4">
                    <MissionHeader title="ภารกิจที่ 15: สรุปสารสนเทศเพื่อโฆษณา" desc="ภารกิจสุดท้าย! ลูกค้า 80% โหวตให้ 'ซุปทรัฟเฟิล' เป็นเมนูโปรดอันดับ 1 เลือกสโลแกนโฆษณาใดที่ดึงดูดและซื่อสัตย์ต่อข้อมูลที่สุด?" />
                    <div class="space-y-3">
                        <ChoiceButton onClick={onSuccess} text="🎉 'ซุปทรัฟเฟิล เมนูยอดฮิตที่ลูกค้ากว่า 80% หลงรัก!'" />
                        <ChoiceButton onClick={onError} text="❌ 'ซุปทรัฟเฟิลที่อร่อยที่สุดในโลก ทุกคนที่ชิมต้องร้องว้าว!'" />
                        <ChoiceButton onClick={onError} text="🤔 'คนไทย 100% เลิกกินเมนูอื่นเพื่อมากินซุปทรัฟเฟิลของเรา!'" />
                    </div>
                </div>
            );
        }

        // Render to DOM
        const root = tragedies = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
