<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StatBiz CEO (สถิติพิชิตธุรกิจ)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; margin: 0; padding: 0; }
        .swal-backdrop { animation: fadeIn 0.3s ease; }
        .swal-popup { animation: scaleIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-900 via-blue-800 to-sky-900 min-h-screen">

    <div id="root"></div>

    <script>
        // สร้าง Alias ย่อส่วนเพื่อให้อ่านง่ายขึ้น (แทนที่ JSX)
        const e = React.createElement;

        // ฟังก์ชันช่วยสร้างไอคอน Lucide
        const createIcon = (name, className = "w-5 h-5 inline") => {
            return e('i', { 'data-lucide': name, class: className });
        };

        const THEME = {
            bg: 'bg-gradient-to-br from-indigo-900 via-blue-800 to-sky-900',
            card: 'bg-white rounded-3xl shadow-2xl border-0 p-4 md:p-8',
            primary: 'bg-indigo-600 hover:bg-indigo-700 text-white shadow-lg shadow-indigo-200',
            secondary: 'bg-sky-100 hover:bg-sky-200 text-sky-800',
            text: 'text-slate-700',
            title: 'text-indigo-800 font-bold',
        };

        const generateRandomQueue = () => {
            const items = [...Array(8).fill('🧋'), ...Array(7).fill('🍵'), ...Array(5).fill('🍫')];
            for (let i = items.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [items[i], items[j]] = [items[j], items[i]];
            }
            return items;
        };

        const PHASE_INFO = {
            1: { title: "ร้านเครื่องดื่มชานมไข่มุก 🧋", level: "เริ่มต้น", goal: "เรียนรู้การจัดระเบียบข้อมูลและคำนวณสถิติพื้นฐาน", color: "from-orange-400 to-amber-600", bgLight: "bg-orange-50", icon: "🧋" },
            2: { title: "ร้านเบเกอรี่แสนหวาน 🥐", level: "ปานกลาง", goal: "เรียนรู้ความสัมพันธ์ของข้อมูลแบบสองมิติและการนำเสนอข้อมูล", color: "from-amber-500 to-pink-500", bgLight: "bg-amber-50", icon: "🥐" },
            3: { title: "ร้านอาหาร Fine Dining 🥩", level: "ประยุกต์ขั้นสูง", goal: "วิเคราะห์ข้อมูลข้อความเชิงลึก และสรุปภาพรวมเพื่อการบริหาร", color: "from-rose-500 to-red-700", bgLight: "bg-rose-50", icon: "🥩" }
        };

        function App() {
            const [viewState, setViewState] = React.useState('intro');
            const [currentMission, setCurrentMission] = React.useState(1);
            const [score, setScore] = React.useState(100);
            const [playerInfo, setPlayerInfo] = React.useState({ name: '', classStr: '', number: '' });
            const [isLoading, setIsLoading] = React.useState(false);
            const [alert, setAlert] = React.useState(null);

            React.useEffect(() => {
                lucide.createIcons();
            }, [viewState, currentMission, alert, isLoading]);

            const currentPhase = currentMission <= 5 ? 1 : currentMission <= 10 ? 2 : 3;

            const showLoading = (callback) => {
                setIsLoading(true);
                setTimeout(() => {
                    setIsLoading(false);
                    callback();
                }, 1000);
            };

            const handleCorrect = () => {
                setAlert({
                    type: 'success',
                    title: 'ยอดเยี่ยมมาก!',
                    text: 'วิเคราะห์ข้อมูลได้อย่างถูกต้อง เฉียบขาดมากท่าน CEO',
                    onConfirm: () => {
                        setAlert(null);
                        if (currentMission === 15) {
                            showLoading(() => setViewState('ending'));
                        } else if (currentMission === 5 || currentMission === 10) {
                            setCurrentMission(prev => prev + 1);
                            showLoading(() => setViewState('phase_intro'));
                        } else {
                            setCurrentMission(prev => prev + 1);
                        }
                    }
                });
            };

            const handleError = () => {
                setScore(prev => Math.max(0, prev - 2));
                setAlert({
                    type: 'error',
                    title: 'ข้อมูลคลาดเคลื่อน!',
                    text: 'อ๊ะ! การตัดสินใจยังไม่ถูกต้อง ลองวิเคราะห์ข้อมูลใหม่อีกครั้งนะ ✌️',
                    onConfirm: () => setAlert(null)
                });
            };

            const handleWarning = (msg) => {
                setAlert({
                    type: 'warning',
                    title: 'ข้อมูลไม่ครบถ้วน',
                    text: msg || 'กรุณากรอกข้อมูลให้ครบทุกช่องก่อนดำเนินการครับ',
                    onConfirm: () => setAlert(null)
                });
            };

            // ส่วน Render วิวต่างๆ ด้วย React.createElement
            let mainContent = null;
            if (viewState === 'intro') {
                mainContent = e(IntroScreen, { onStart: () => showLoading(() => setViewState('phase_intro')), playerInfo, setPlayerInfo, onWarning: handleWarning });
            } else if (viewState === 'phase_intro') {
                mainContent = e(PhaseIntroScreen, { phase: currentPhase, onStart: () => showLoading(() => setViewState('playing')) });
            } else if (viewState === 'playing') {
                let missionComponent = null;
                if (currentMission === 1) missionComponent = e(Mission1, { onSuccess: handleCorrect });
                else if (currentMission === 2) missionComponent = e(Mission2, { onSuccess: handleCorrect, onError: handleError, onWarning: handleWarning });
                else if (currentMission === 3) missionComponent = e(Mission3, { onSuccess: handleCorrect, onError: handleError, onWarning: handleWarning });
                else if (currentMission === 4) missionComponent = e(Mission4, { onSuccess: handleCorrect, onError: handleError, onWarning: handleWarning });
                else if (currentMission === 5) missionComponent = e(Mission5, { onSuccess: handleCorrect, onError: handleError });
                else if (currentMission === 6) missionComponent = e(Mission6, { onSuccess: handleCorrect, onError: handleError, onWarning: handleWarning });
                else if (currentMission === 7) missionComponent = e(Mission7, { onSuccess: handleCorrect, onError: handleError, onWarning: handleWarning });
                else if (currentMission === 8) missionComponent = e(Mission8, { onSuccess: handleCorrect, onError: handleError });
                else if (currentMission === 9) missionComponent = e(Mission9, { onSuccess: handleCorrect, onError: handleError });
                else if (currentMission === 10) missionComponent = e(Mission10, { onSuccess: handleCorrect, onError: handleError });
                else if (currentMission === 11) missionComponent = e(Mission11, { onSuccess: handleCorrect, onError: handleError, onWarning: handleWarning });
                else if (currentMission === 12) missionComponent = e(Mission12, { onSuccess: handleCorrect, onError: handleError });
                else if (currentMission === 13) missionComponent = e(Mission13, { onSuccess: handleCorrect, onError: handleError });
                else if (currentMission === 14) missionComponent = e(Mission14, { onSuccess: handleCorrect, onError: handleError });
                else if (currentMission === 15) missionComponent = e(Mission15, { onSuccess: handleCorrect, onError: handleError });

                mainContent = e('div', { class: 'space-y-4 md:space-y-6' },
                    e('div', { 
                        class: 'flex justify-between items-center bg-white/95 backdrop-blur rounded-2xl p-3 md:p-4 shadow-lg border-b-4', 
                        style: { borderColor: currentPhase === 1 ? '#f97316' : currentPhase === 2 ? '#d97706' : '#be123c' }
                    },
                        e('div', { class: 'flex items-center gap-3 md:gap-4' },
                            e('div', { class: `w-10 h-10 md:w-12 md:h-12 rounded-xl flex items-center justify-center text-xl md:text-2xl shadow-inner ${PHASE_INFO[currentPhase].bgLight}` }, PHASE_INFO[currentPhase].icon),
                            e('div', null,
                                e('h2', { class: 'text-base md:text-xl font-bold text-slate-800 leading-tight' }, `Phase ${currentPhase}: ${PHASE_INFO[currentPhase].title}`),
                                e('p', { class: 'text-xs md:text-sm text-slate-500 font-medium' }, `ภารกิจที่ ${currentMission}/15 • Level: ${PHASE_INFO[currentPhase].level}`)
                            )
                        ),
                        e('div', { class: 'text-right flex flex-col items-end shrink-0' },
                            e('div', { class: 'flex items-center gap-1 bg-slate-50 px-2 py-1 md:px-3 md:py-1 rounded-full border border-slate-200' },
                                createIcon('star', 'w-5 h-5 text-yellow-400 fill-yellow-400 inline'),
                                e('span', { class: 'text-lg md:text-xl font-bold text-indigo-700' }, score)
                            )
                        )
                    ),
                    e('div', { class: THEME.card }, missionComponent)
                );
            } else if (viewState === 'ending') {
                mainContent = e(EndingScreen, { score, playerInfo, onRestart: () => showLoading(() => { setViewState('intro'); setCurrentMission(1); setScore(100); setPlayerInfo({ name: '', classStr: '', number: '' }); }) });
            }

            return e('div', { class: 'text-slate-800 flex flex-col relative min-h-screen' },
                e('div', { class: 'flex-grow flex items-center justify-center p-3 md:p-8 z-10 pb-20' },
                    e('div', { class: 'max-w-4xl w-full' }, mainContent)
                ),
                e('footer', { class: 'w-full py-4 text-center text-white/70 text-xs md:text-sm absolute bottom-0 font-medium z-0' }, '© 2026 Copyright | พัฒนาโดย คุณครูพิมพ์ลักษณ์ เจริญวานิชกูร'),
                isLoading && e(LoadingOverlay),
                alert && e(SweetAlert, alert)
            );
        }

        // --- ส่วนประกอบย่อย (SUB COMPONENTS)แปลงเป็น React.createElement ---
        function LoadingOverlay() {
            return e('div', { class: 'fixed inset-0 bg-indigo-900/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center swal-backdrop' },
                e('div', { class: 'w-16 h-16 md:w-20 md:h-20 border-4 border-indigo-200 border-t-white rounded-full animate-spin mb-4' }),
                e('h3', { class: 'text-white text-lg md:text-xl font-bold tracking-widest animate-pulse' }, 'กำลังประมวลผล...')
            );
        }

        function SweetAlert({ type, title, text, onConfirm }) {
            const isSuccess = type === 'success';
            const isWarning = type === 'warning';
            let iconBg = 'bg-rose-100 text-rose-500';
            let btnBg = 'bg-rose-500 hover:bg-rose-600';
            let iconName = isSuccess ? 'check' : 'alert-circle';
            if (isSuccess) { iconBg = 'bg-emerald-100 text-emerald-500'; btnBg = 'bg-emerald-500 hover:bg-emerald-600'; }
            else if (isWarning) { iconBg = 'bg-amber-100 text-amber-500'; btnBg = 'bg-amber-500 hover:bg-amber-600'; }

            return e('div', { class: 'fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 swal-backdrop' },
                e('div', { class: 'bg-white rounded-3xl p-6 md:p-8 max-w-sm w-full text-center shadow-2xl swal-popup flex flex-col items-center' },
                    e('div', { class: `w-16 h-16 md:w-20 md:h-20 rounded-full flex items-center justify-center mb-4 shadow-inner ${iconBg}` },
                        createIcon(iconName, "w-8 h-8 md:w-10 md:h-10")
                    ),
                    e('h2', { class: 'text-xl md:text-2xl font-bold text-slate-800 mb-2' }, title),
                    e('p', { class: 'text-sm md:text-base text-slate-600 mb-6' }, text),
                    e('button', { onClick: onConfirm, class: `w-full py-3 rounded-xl font-bold text-white shadow-md transition-transform hover:scale-105 ${btnBg}` }, isSuccess ? 'ลุยภารกิจต่อไป!' : 'ตกลง')
                )
            );
        }

        function IntroScreen({ onStart, playerInfo, setPlayerInfo, onWarning }) {
            return e('div', { class: THEME.card + ' text-center space-y-6 md:space-y-8 py-10 md:py-14 relative overflow-hidden' },
                e('div', { class: 'relative z-10' },
                    e('div', { class: 'flex justify-center mb-4' }, e('div', { class: 'bg-indigo-100 p-4 rounded-3xl shadow-inner' }, createIcon('briefcase', 'w-12 h-12'))),
                    e('h1', { class: 'text-4xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-sky-500 mb-2' }, 'StatBiz CEO'),
                    e('h2', { class: 'text-xl md:text-2xl text-slate-500 font-semibold mb-4' }, 'สถิติพิชิตธุรกิจ 📊'),
                    e('p', { class: 'text-slate-600 max-w-lg mx-auto text-sm md:text-lg mb-6' }, 'ยินดีต้อนรับท่าน CEO คนใหม่! ภารกิจของคุณคือการบริหารธุรกิจ 3 ระดับ โดยใช้ "ข้อมูลเชิงคุณภาพ" มาวิเคราะห์เพื่อการตัดสินใจ'),
                    e('div', { class: 'bg-slate-50 p-5 rounded-2xl border border-slate-200 max-w-lg mx-auto mb-8 text-left space-y-4 shadow-sm' },
                        e('h3', { class: 'font-bold text-indigo-900 text-base flex items-center gap-2 border-b border-indigo-100 pb-2' }, createIcon('users', 'w-5 h-5'), ' ข้อมูลผู้บริหาร (CEO)'),
                        e('div', null,
                            e('label', { class: 'block text-xs font-semibold text-slate-600 mb-1' }, 'ชื่อ-นามสกุล'),
                            e('input', { type: 'text', class: 'w-full border-2 border-slate-300 rounded-xl px-3 py-2 text-sm focus:border-indigo-500 outline-none', placeholder: 'นาย / นางสาว', value: playerInfo.name, onChange: e => setPlayerInfo({...playerInfo, name: e.target.value}) })
                        ),
                        e('div', { class: 'flex gap-4' },
                            e('div', { class: 'flex-1' },
                                e('label', { class: 'block text-xs font-semibold text-slate-600 mb-1' }, 'ชั้นเรียน'),
                                e('input', { type: 'text', class: 'w-full border-2 border-slate-300 rounded-xl px-3 py-2 text-sm focus:border-indigo-500 outline-none', placeholder: 'เช่น ม.6/1', value: playerInfo.classStr, onChange: e => setPlayerInfo({...playerInfo, classStr: e.target.value}) })
                            ),
                            e('div', { class: 'w-32' },
                                e('label', { class: 'block text-xs font-semibold text-slate-600 mb-1' }, 'เลขที่'),
                                e('input', { type: 'text', class: 'w-full border-2 border-slate-300 rounded-xl px-3 py-2 text-sm focus:border-indigo-500 outline-none', placeholder: 'เลขที่', value: playerInfo.number, onChange: e => setPlayerInfo({...playerInfo, number: e.target.value}) })
                            )
                        )
                    ),
                    e('button', { 
                        onClick: () => { if(!playerInfo.name.trim() || !playerInfo.classStr.trim() || !playerInfo.number.trim()) { onWarning('กรุณากรอกข้อมูลให้ครบถ้วนก่อนเข้าเล่นครับ'); return; } onStart(); }, 
                        class: THEME.primary + ' px-8 py-3 rounded-full font-bold text-lg md:text-xl flex items-center justify-center gap-3 mx-auto transition-transform hover:scale-105 w-full md:w-auto' 
                    }, createIcon('play', 'w-6 h-6'), 'เข้าสู่ระบบบริหารงาน')
                )
            );
        }

        function PhaseIntroScreen({ phase, onStart }) {
            const info = PHASE_INFO[phase];
            return e('div', { class: THEME.card + ' text-center space-y-6 py-10 md:py-12 relative overflow-hidden' },
                e('div', { class: `absolute top-0 left-0 w-full h-3 bg-gradient-to-r ${info.color}` }),
                e('div', { class: 'text-6xl md:text-7xl mb-2' }, info.icon),
                e('div', { class: 'space-y-2' },
                    e('h3', { class: 'text-indigo-500 font-bold tracking-widest uppercase text-xs' }, 'ยินดีต้อนรับท่าน CEO'),
                    e('h1', { class: 'text-2xl md:text-4xl font-black text-slate-800 leading-tight' }, `บริหารธุรกิจ ${info.title}`),
                    e('div', { class: 'inline-block bg-slate-100 px-3 py-1 rounded-full text-slate-600 font-semibold text-xs border border-slate-200 mt-2' }, `Level: ${info.level}`)
                ),
                e('div', { class: 'bg-indigo-50/50 border border-indigo-100 rounded-2xl p-4 max-w-lg mx-auto shadow-sm' },
                    e('h4', { class: 'font-bold text-indigo-800 mb-2 flex items-center justify-center gap-2 text-sm' }, createIcon('award', 'w-6 h-6'), 'เป้าหมายการเรียนรู้'),
                    e('p', { class: 'text-slate-700 text-sm md:text-lg' }, info.goal)
                ),
                e('button', { onClick: onStart, class: `bg-gradient-to-r ${info.color} text-white px-6 py-3 rounded-full font-bold text-base md:text-lg flex items-center justify-center gap-2 mx-auto transition-transform hover:scale-105 shadow-lg w-full md:w-auto` }, 'เริ่มบริหารกิจการ ', createIcon('chevron-right'))
            );
        }

        function EndingScreen({ score, playerInfo, onRestart }) {
            const getShopStatus = (type) => {
                if (score >= 80) {
                    if (type === 'drink') return { text: "ลูกค้าเต็มร้านล้นทะลัก!", color: "text-emerald-600", dot: "bg-emerald-500" };
                    if (type === 'bakery') return { text: "คิวยาวทะลุซอย!", color: "text-emerald-600", dot: "bg-emerald-500" };
                    if (type === 'resto') return { text: "จองโต๊ะเต็มข้ามปี!", color: "text-emerald-600", dot: "bg-emerald-500" };
                } else if (score >= 50) {
                    if (type === 'drink') return { text: "ลูกค้าแวะมาเรื่อยๆ", color: "text-amber-600", dot: "bg-amber-500" };
                    if (type === 'bakery') return { text: "ขายหมดพอดีตอนเย็น", color: "text-amber-600", dot: "bg-amber-500" };
                    if (type === 'resto') return { text: "โต๊ะเต็มช่วงสุดสัปดาห์", color: "text-amber-600", dot: "bg-amber-500" };
                } else {
                    if (type === 'drink') return { text: "ลูกค้าน้อยไปนิด จัดโปรด่วน!", color: "text-rose-500", dot: "bg-rose-500" };
                    if (type === 'bakery') return { text: "ขนมเหลือเพียบ...", color: "text-rose-500", dot: "bg-rose-500" };
                    if (type === 'resto') return { text: "มีโต๊ะว่างหลายโต๊ะเลย", color: "text-rose-500", dot: "bg-rose-500" };
                }
            };
            const dS = getShopStatus('drink'); const bS = getShopStatus('bakery'); const rS = getShopStatus('resto');
            return e('div', { class: THEME.card + ' text-center space-y-6 py-8 relative overflow-hidden' },
                e('div', { class: 'absolute top-0 left-0 w-full h-4 bg-gradient-to-r from-emerald-400 to-teal-500' }),
                e('div', { class: 'space-y-2' },
                    e('h1', { class: 'text-3xl md:text-5xl font-black text-slate-800' }, 'StatBiz CEO'),
                    e('h2', { class: 'text-2xl md:text-4xl font-black text-indigo-600' }, 'สถิติพิชิตธุรกิจ'),
                    e('p', { class: 'text-sm md:text-lg text-emerald-700 font-bold bg-emerald-50 border border-emerald-100 inline-block px-4 py-1.5 rounded-full mt-2' }, 'สรุปผลการบริหารธุรกิจของ CEO')
                ),
                e('div', { class: 'bg-gradient-to-r from-indigo-50 to-blue-50 border border-indigo-200 text-indigo-900 px-4 py-3 rounded-2xl inline-flex flex-col md:flex-row items-center gap-2 shadow-sm w-full md:w-auto' },
                    e('div', { class: 'flex items-center gap-2 font-black text-lg md:text-2xl' }, e('span', null, playerInfo.name || 'ผู้บริหาร')),
                    e('div', { class: 'text-sm font-semibold text-indigo-600 bg-white px-3 py-1 rounded-full shadow-sm' }, `ชั้น ${playerInfo.classStr} | เลขที่ ${playerInfo.number}`)
                ),
                e('div', { class: 'grid grid-cols-1 sm:grid-cols-3 gap-4 mt-4' },
                    e('div', { class: 'bg-orange-50 border border-orange-200 rounded-2xl p-4 flex flex-col items-center shadow-sm' },
                        e('div', { class: 'text-5xl mb-2' }, '🧋'),
                        e('h3', { class: 'font-bold text-orange-800' }, 'ร้านเครื่องดื่ม'),
                        e('div', { class: `text-xs flex items-center font-bold mt-1 ${dS.color}` }, e('span', { class: `w-2.5 h-2.5 rounded-full mr-1 ${dS.dot}` }), dS.text)
                    ),
                    e('div', { class: 'bg-amber-50 border border-amber-200 rounded-2xl p-4 flex flex-col items-center shadow-sm' },
                        e('div', { class: 'text-5xl mb-2' }, '🥐'),
                        e('h3', { class: 'font-bold text-amber-800' }, 'ร้านเบเกอรี่'),
                        e('div', { class: `text-xs flex items-center font-bold mt-1 ${bS.color}` }, e('span', { class: `w-2.5 h-2.5 rounded-full mr-1 ${bS.dot}` }), bS.text)
                    ),
                    e('div', { class: 'bg-rose-50 border border-rose-200 rounded-2xl p-4 flex flex-col items-center shadow-sm' },
                        e('div', { class: 'text-5xl mb-2' }, '🥩'),
                        e('h3', { class: 'font-bold text-rose-800' }, 'ร้านอาหาร'),
                        e('div', { class: `text-xs flex items-center font-bold mt-1 ${rS.color}` }, e('span', { class: `w-2.5 h-2.5 rounded-full mr-1 ${rS.dot}` }), rS.text)
                    )
                ),
                e('div', { class: 'bg-slate-50 p-5 rounded-3xl border border-slate-200 flex flex-col items-center' },

                                e('span', { class: 'text-xs font-bold text-slate-500' }, 'วัยรุ่น')
                            ),
                            e('div', { class: 'flex flex-col items-center gap-2 w-1/2 h-full justify-end' },
                                e('div', { class: 'flex gap-1.5 items-end w-full justify-center' }, e('div', { class: 'bg-pink-400 w-7 rounded-t shadow-md h-[25px]' }), e('div', { class: 'bg-amber-500 w-7 rounded-t shadow-md h-[85px]' })),
                                e('span', { class: 'text-xs font-bold text-slate-500' }, 'ผู้ใหญ่')
                            )
                        ),
                        e('div', { class: 'flex justify-center gap-4 mt-4 text-xs font-medium text-slate-500' },
                            e('span', { class: 'flex items-center gap-1' }, e('div', { class: 'w-3 h-3 bg-pink-400 rounded' }), ' เค้ก'),
                            e('span', { class: 'flex items-center gap-1' }, e('div', { class: 'w-3 h-3 bg-amber-500 rounded' }), ' ครัวซองต์')
                        )
                    ),
                    e('div', { onClick: onError, class: 'bg-white border-2 border-slate-200 hover:border-rose-400 rounded-3xl p-4 cursor-pointer transition-all group' },
                        e('h4', { class: 'text-center font-bold mb-4 text-slate-500 bg-slate-50 py-1.5 rounded-lg' }, 'ตัวเลือก B'),
                        e('div', { class: 'flex justify-around items-end h-36 border-b-2 border-slate-300 pb-2 relative px-2' },
                            e('div', { class: 'flex gap-6 items-end w-full justify-center h-full' },
                                e('div', { class: 'flex flex-col items-center gap-2 justify-end h-full' }, e('div', { class: 'bg-pink-400 w-12 rounded-t shadow-md h-[60px]' }), e('span', { class: 'text-xs font-bold text-slate-500' }, 'รวมเค้ก')),
                                e('div', { class: 'flex flex-col items-center gap-2 justify-end h-full' }, e('div', { class: 'bg-amber-500 w-12 rounded-t shadow-md h-[90px]' }), e('span', { class: 'text-xs font-bold text-slate-500' }, 'รวมครัวซองต์'))
                            )
                        )
                    )
                )
            );
        }

        function Mission9({ onSuccess, onError }) {
            return e('div', { class: 'space-y-4' },
                e(MissionHeader, { title: "ภารกิจที่ 9: อ่านกราฟวงกลม (Pie Chart)", desc: "กราฟแสดงสัดส่วนช่วงเวลาที่ลูกค้าเข้าร้านหนาแน่นที่สุด ช่วงเวลาใดควรเตรียมพนักงานไว้มากที่สุด?" }),
                e('div', { class: 'flex flex-col md:flex-row items-center justify-center gap-6 bg-slate-50 p-6 rounded-3xl border border-slate-200' },
                    e('div', { class: 'w-48 h-48 rounded-full border-4 border-white shadow-lg relative flex items-center justify-center shrink-0', style: { background: 'conic-gradient(#f472b6 0% 25%, #fbbf24 25% 40%, #38bdf8 40% 100%)' } },
                        e('span', { class: 'absolute top-6 right-4 text-white font-black text-xs' }, 'เช้า 25%'),
                        e('span', { class: 'absolute bottom-8 right-2 text-white font-black text-xs' }, 'บ่าย 15%'),
                        e('span', { class: 'absolute top-1/2 left-4 -translate-y-1/2 text-white font-black text-xl' }, 'เย็น 60%')
                    ),
                    e('div', { class: 'flex-1 space-y-2 w-full max-w-sm' },
                        e(ChoiceButton, { onClick: onError, text: "ช่วงเช้า (สีชมพู)" }),
                        e(ChoiceButton, { onClick: onError, text: "ช่วงบ่าย (สีเหลือง)" }),
                        e(ChoiceButton, { onClick: onSuccess, text: "ช่วงเย็น (สีฟ้า)" })
                    )
                )
            );
        }

        function Mission10({ onSuccess, onError }) {
            return e('div', { class: 'space-y-4' },
                e(MissionHeader, { title: "ภารกิจที่ 10: วิเคราะห์ข้อจำกัดของสถิติ", desc: "ข้อมูลเชิงคุณภาพ มีข้อจำกัดบางอย่าง ข้อใดกล่าวถูกต้องที่สุดเกี่ยวกับการนำ 'หน้าตาของเค้กที่ชอบ' มาคำนวณ?" }),
                e('div', { class: 'space-y-3' },
                    e(ChoiceButton, { onClick: onError, text: "ก. สามารถนำมาหาค่าเฉลี่ย (Mean) ได้ ถ้านำไปให้คะแนน 1-10" }),
                    e(ChoiceButton, { onClick: onSuccess, text: "ข. เป็นข้อมูลเชิงคุณภาพ สามารถหาได้แค่ 'ฐานนิยม' แต่หา 'ค่าเฉลี่ยเลขคณิต' ไม่ได้" }),
                    e(ChoiceButton, { onClick: onError, text: "ค. ข้อมูลเชิงคุณภาพไม่สามารถนำมาทำตารางความถี่ได้เลย" })
                )
            );
        }

        function Mission11({ onSuccess, onError, onWarning }) {
            const [selections, setSelections] = React.useState({ r1: '', r2: '', r3: '', r4: '', r5: '' });
            const reviews = [
                { id: 'r1', text: "สเต็กเนื้อเหนียวมาก ซอสก็เค็มไปหน่อย เสียใจมากค่ะ" },
                { id: 'r2', text: "พนักงานไม่สนใจเลย เรียกเช็คบิลรอไป 20 นาที" },
                { id: 'r3', text: "จองโต๊ะไว้ล่วงหน้า แต่พอมาถึงกลับบอกว่าโต๊ะเต็ม ระบบแย่มาก" },
                { id: 'r4', text: "อร่อยนะ แต่ให้ปริมาณนิดเดียวเมื่อเทียบกับเงินที่จ่าย แพงเกินไปมาก" },
                { id: 'r5', text: "น้ำเปล่าขวดละ 200 บาท ราคาขูดรีดมากเกินไปครับ" }
            ];
            return e('div', { class: 'space-y-4' },
                e(MissionHeader, { title: "ภารกิจที่ 11: วิเคราะห์ข้อความรีวิว", desc: "อ่านรีวิวด้านลบจากลูกค้า แล้วเลือกหมวดหมู่ปัญหาหลักให้ถูกต้องเพื่อนำไปปรับปรุงร้าน Fine Dining" }),
                e('div', { class: 'space-y-3' },
                    reviews.map(r => e('div', { key: r.id, class: 'bg-slate-50 p-3 rounded-xl border border-slate-200 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2 text-xs md:text-sm' },
                        e('p', { class: 'italic text-slate-700 font-medium text-left' }, `"${r.text}"`),
                        e('select', { 
                            class: 'border-2 border-slate-300 rounded-lg p-1.5 bg-white font-bold text-indigo-900 w-full sm:w-auto outline-none', 
                            value: selections[r.id], 
                            onChange: e => setSelections({...selections, [r.id]: e.target.value}) 
                        },
                            e('option', { value: "" }, "-- ปัญหา --"),
                            e('option', { value: "taste" }, "🍽️ รสชาติ"),
                            e('option', { value: "service" }, "👨‍🍳 บริการ"),
                            e('option', { value: "price" }, "💸 ราคา")
                        )
                    ))
                ),
                e(SubmitButton, { onClick: () => {
                    if(!selections.r1 || !selections.r2 || !selections.r3 || !selections.r4 || !selections.r5) { onWarning('กรุณาจัดหมวดหมู่ให้ครบ 5 ช่องครับ'); return; }
                    (selections.r1 === 'taste' && selections.r2 === 'service' && selections.r3 === 'service' && selections.r4 === 'price' && selections.r5 === 'price') ? onSuccess() : onError();
                }})
            );
        }

        function Mission12({ onSuccess, onError }) {
            return e('div', { class: 'space-y-4' },
                e(MissionHeader, { title: "ภารกิจที่ 12: ตัดสินใจจากฐานนิยม", desc: "จากข้อที่แล้ว ถ้าผลรีวิว 100 ข้อความพบว่า: บ่นรสชาติ 20%, บ่นบริการ 70%, บ่นราคา 10% CEO ต้องสั่งแก้ปัญหาใดด่วนที่สุด?" }),
                e('div', { class: 'grid grid-cols-1 md:grid-cols-3 gap-3' },
                    e(ChoiceButton, { onClick: onError, text: "รสชาติอาหาร (20%)", icon: "🍽️" }),
                    e(ChoiceButton, { onClick: onSuccess, text: "การบริการพนักงาน (70%)", icon: "👨‍🍳" }),
                    e(ChoiceButton, { onClick: onError, text: "ราคาแพง (10%)", icon: "💸" })
                )
            );
        }

        function Mission13({ onSuccess, onError }) {
            return e('div', { class: 'space-y-4' },
                e(MissionHeader, { title: "ภารกิจที่ 13: วางแผนยุทธศาสตร์", desc: "จะเปิดสาขาใหม่ แดชบอร์ดรายงานว่า 'คนทำงานย่านสีลมชอบทานเนื้อวัวพรีเมียม (85%)' ควรเลือกทำเลและวัตถุดิบอย่างไร?" }),
                e('div', { class: 'space-y-3' },
                    e(ChoiceButton, { onClick: onError, text: "เปิดย่านสยามสแควร์ (วัยรุ่น) และเน้นเมนูหมูกระทะ" }),
                    e(ChoiceButton, { onClick: onSuccess, text: "เปิดสาขาที่สีลม และสั่งนำเข้าเนื้อวัวเกรด A+ ล็อตใหญ่" }),
                    e(ChoiceButton, { onClick: onError, text: "เปิดสาขาสีลม แต่เน้นเมนูผักสลัดเพื่อสุขภาพ (15%)" })
                )
            );
        }

        function Mission14({ onSuccess, onError }) {
            return e('div', { class: 'space-y-4' },
                e(MissionHeader, { title: "ภารกิจที่ 14: ตรวจสอบรายงาน (Data Validation)", desc: "พนักงานรายงานว่า 'ความพึงพอใจลูกค้า (ดีมาก=3, ปานกลาง=2, แย่=1) เฉลี่ยได้ 2.45' คุณควรสอนพนักงานว่าอย่างไร?" }),
                e('div', { class: 'space-y-3' },
                    e(ChoiceButton, { onClick: onError, text: "'เยี่ยมมาก ตัวเลขชัดเจนดี ทำรายงานแบบนี้ต่อไป'" }),
                    e(ChoiceButton, { onClick: onError, text: "'ไปคำนวณใหม่ น่าจะบวกเลขผิดแน่ๆ'" }),
                    e(ChoiceButton, { onClick: onSuccess, text: "'ความพึงพอใจเป็นข้อมูลเชิงคุณภาพแบบจัดอันดับ ไม่ควรหาค่าเฉลี่ย ควรรายงานเป็นร้อยละแทน'" })
                )
            );
        }

        function Mission15({ onSuccess, onError }) {
            return e('div', { class: 'space-y-4' },
                e(MissionHeader, { title: "ภารกิจที่ 15: สรุปสารสนเทศเพื่อโฆษณา", desc: "ภารกิจสุดท้าย! ลูกค้า 80% โหวตให้ 'ซุปทรัฟเฟิล' เป็นเมนูโปรดอันดับ 1 คุณจะเลือกสโลแกนโฆษณาใดที่ดึงดูดและซื่อสัตย์ต่อข้อมูลที่สุด?" }),
                e('div', { class: 'space-y-3' },
                    e(ChoiceButton, { onClick: onSuccess, text: "🎉 'ซุปทรัฟเฟิล เมนูยอดฮิตที่ลูกค้ากว่า 80% หลงรัก!'" }),
                    e(ChoiceButton, { onClick: onError, text: "❌ 'ซุปทรัฟเฟิลที่อร่อยที่สุดในโลก ทุกคนที่ชิมต้องร้องว้าว!'" }),
                    e(ChoiceButton, { onClick: onError, text: "🤔 'คนไทย 100% เลิกกินเมนูอื่นเพื่อมากินซุปทรัฟเฟิลของเรา!'" })
                )
            );
        }

        // สั่งให้ React เรนเดอร์ลงใน DOM โดยไม่ต้องผ่านตัวแปลงภาษาแบบ In-browser Babel
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(e(App));
    </script>
</body>
</html>
